<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
    <title>Six Deep — Members Only</title>

    <!-- Brand color for the iOS status bar / Safari chrome -->
    <meta name="theme-color" content="#07140d" />

    <!-- iOS · Add to Home Screen support -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Six Deep" />
    <meta name="format-detection" content="telephone=no" />

    <!-- Touch icons (relative paths so the same build works under any base) -->
    <link rel="apple-touch-icon" href="./apple-touch-icon.png" sizes="180x180" />
    <link rel="apple-touch-icon" href="./icon-192.png" sizes="192x192" />
    <link rel="apple-touch-icon" href="./icon-512.png" sizes="512x512" />
    <link rel="icon" type="image/png" href="./favicon.png" sizes="32x32" />
    <link rel="icon" type="image/svg+xml" href="./brand-six.svg" />

    <!-- Web manifest (PWA) -->
    <link rel="manifest" href="./sd-manifest.webmanifest" />

    <!-- Open Graph (link previews if you airdrop / iMessage the URL) -->
    <meta property="og:title" content="Six Deep" />
    <meta property="og:description" content="A members' club, on a phone. Track your best rounds. Own your game." />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="./icon-1024.png" />

    <style>
      html, body, #root {
        margin: 0;
        padding: 0;
        height: 100%;
        background: #07140d;
        /* iPhone safe-area insets so the app respects the notch / home bar */
        padding-top: env(safe-area-inset-top);
        padding-bottom: env(safe-area-inset-bottom);
        padding-left: env(safe-area-inset-left);
        padding-right: env(safe-area-inset-right);
      }
      /* Disable iOS rubber-band overscroll bounce on the body */
      body { overscroll-behavior-y: none; }
      /* Prevent text selection on long-press (more app-like) */
      #root { -webkit-touch-callout: none; -webkit-user-select: none; user-select: none; }
      /* But keep selection in inputs / textareas */
      input, textarea, [contenteditable] { -webkit-user-select: text; user-select: text; }
    </style>
    <script type="module" crossorigin src="/sixdeep/assets/index-D6U0vLWO.js"></script>
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
