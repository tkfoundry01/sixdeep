  <!-- The 6 -->
  <path d="M 198 60 C 198 60, 132 52, 102 100 C 72 148, 70 184, 80 204 C 96 232, 132 240, 168 234 C 212 226, 232 196, 226 164 C 220 132, 192 116, 158 122 C 128 126, 108 146, 106 170 L 106 178 C 106 198, 128 218, 158 218 C 188 218, 204 198, 204 176 C 204 154, 188 144, 168 144 C 148 144, 132 158, 132 176"
